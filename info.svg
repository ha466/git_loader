<svg width="100%" height="980" viewBox="0 0 920 980" fill="none" xmlns="http://www.w3.org/2000/svg" style="background:#0f0f1a;">
  <defs>
    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#16213e" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="920" height="980" fill="#0f0f1a"/>

  <!-- Main Glass Card -->
  <rect x="50" y="70" width="820" height="820" rx="32" fill="url(#glass)" stroke="#60a5fa" stroke-width="3" stroke-opacity="0.6"/>

  <!-- Title -->
  <text x="460" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#e0f2fe" text-anchor="middle" letter-spacing="-2">
    🛸 Git Loader
  </text>
  <text x="460" y="172" font-family="system-ui, sans-serif" font-size="19" fill="#93c5fd" text-anchor="middle" font-style="italic" letter-spacing="1">
    Glassy GitHub Downloader
  </text>

  <!-- Tagline -->
  <text x="460" y="215" font-family="system-ui, sans-serif" font-size="17.5" fill="#cbd5e1" text-anchor="middle" font-weight="500" letter-spacing="0.5">
    Because downloading 5GB just for one folder is a crime against bandwidth.
  </text>

  <!-- Short Description -->
  <text x="460" y="255" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle" line-spacing="8">
    Paste a GitHub folder URL → Get only that folder as a clean ZIP.
  </text>

  <!-- Features -->
  <text x="460" y="315" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#60a5fa" text-anchor="middle">
    ✨ Why You'll Love It
  </text>

  <g font-family="system-ui, sans-serif" font-size="16.5" fill="#c1d6f0">
    <text x="110" y="370">🎯 Surgical Precision — Download exactly the folder you need</text>
    <text x="110" y="405">🌳 Interactive File Tree — Uncheck unwanted files</text>
    <text x="110" y="440">🕶️ Beautiful Glassmorphism UI with floating orbs</text>
    <text x="110" y="475">🧠 Smart Traversal — Works on massive repositories</text>
    <text x="110" y="510">🕵️ Zero Backend — Everything runs in your browser</text>
  </g>

  <!-- How to Use -->
  <text x="460" y="580" font-family="system-ui, sans-serif" font-size="25" font-weight="700" fill="#60a5fa" text-anchor="middle">
    🚀 How to Use
  </text>

  <rect x="100" y="605" width="720" height="2" fill="#334155" rx="1"/>

  <g font-family="system-ui, sans-serif" font-size="15.5" fill="#b3c5e0" line-spacing="6">
    <text x="130" y="645">1. Navigate to any GitHub folder and copy the URL</text>
    <text x="130" y="675">2. Paste it into Git Loader</text>
    <text x="130" y="705">3. Browse the interactive file tree</text>
    <text x="130" y="735">4. Click Download (or select specific files)</text>
  </g>

  <!-- Bottom Section -->
  <text x="460" y="815" font-family="system-ui, sans-serif" font-size="14.5" fill="#64748b" text-anchor="middle">
    Pure Vanilla JS • Tailwind via CDN • No build tools • Just open index.html
  </text>

  <text x="460" y="845" font-family="system-ui, sans-serif" font-size="13.5" fill="#475569" text-anchor="middle">
    Made with ❤️, ☕, and pure hatred for unnecessary node_modules
  </text>

  <!-- Decorative floating orbs -->
  <circle cx="130" cy="180" r="22" fill="#60a5fa" fill-opacity="0.18"/>
  <circle cx="780" cy="240" r="28" fill="#c084fc" fill-opacity="0.16"/>
  <circle cx="720" cy="720" r="19" fill="#34d399" fill-opacity="0.20"/>
  <circle cx="180" cy="780" r="15" fill="#f472b6" fill-opacity="0.14"/>

  <!-- Subtle border glow -->
  <rect x="48" y="68" width="824" height="824" rx="34" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.25"/>
</svg>
